<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object Exercise</title>
    <script>
      const product = {
        name: "basketball",
        price: 2095,
      };
      console.log(product);

      product.price += 500;
      console.log(product);

      product["delivery-time"] = "3 days";
      console.log(product);

      function comparePrice(product1, product2) {
        return product1.price < product2.price ? product1 : product2;
      }
      const product1 = {
        name: "football",
        price: 1995,
      };
      const product2 = {
        name: "basketball",
        price: 2595,
      };
      console.log(comparePrice(product1, product2));

      function isSameProduct(product1, product2) {
        return product1.name === product2.name &&
          product1.price === product2.price
          ? true
          : false;
      }
      console.log(isSameProduct(product1, product2));
      console.log(isSameProduct(product1, product1));

      console.log("Good Morning".toLowerCase());

      console.log("test".repeat(2));

      let calculation = localStorage.getItem("cal") || "";
      console.log(calculation);
      function updateCalculation(value){
            if (value === ' = ') {
                calculation = eval(calculation);
                console.log(calculation);
            }
            else if (value === 'clear'){
                calculation = '';
                console.log('Cleared.');
            }
            else{
                calculation += value;
                console.log(calculation);
            }
            localStorage.setItem('cal', calculation);
        }
    </script>
  </head>
  <body>
    <p>Calculator</p>

    <p>
      <button onclick="updateCalculation('1')">1</button>
      <button onclick="updateCalculation('2')">2</button>
      <button onclick="updateCalculation('3')">3</button>
      <button onclick="updateCalculation(' + ')">+</button>
    </p>

    <p>
      <button onclick="updateCalculation('4')">4</button>
      <button onclick="updateCalculation('5')">5</button>
      <button onclick="updateCalculation('6')">6</button>
      <button onclick="updateCalculation(' - ')">-</button>
    </p>

    <p>
      <button onclick="updateCalculation('7')">7</button>
      <button onclick="updateCalculation('8')">8</button>
      <button onclick="updateCalculation('9')">9</button>
      <button onclick="updateCalculation(' * ')">*</button>
    </p>

    <p>
      <button onclick="updateCalculation('0')">0</button>
      <button onclick="updateCalculation('.')">.</button>
      <button onclick="updateCalculation(' = ')">=</button>
      <button onclick="updateCalculation(' / ')">/</button>
    </p>

    <p>
      <button onclick="updateCalculation('clear')">Clear</button>
    </p>
  </body>
</html>
